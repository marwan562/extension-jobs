<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Job Control Center</title><link rel="stylesheet" href="styles.css"></head><body>
<header><h1>Job Control Center</h1><span id="health">Checking…</span><button id="stop" class="danger">Emergency stop</button><button id="reset-stop">Reset</button></header><p id="status"></p>
<section><h2>Secure pairing</h2><form id="pair"><input id="pair-code" type="password" required placeholder="One-time pairing code" autocomplete="off"><button>Pair</button></form></section>
<section><h2>OpenClaw chat</h2><pre id="messages"></pre><form id="chat"><input id="chat-input" required maxlength="8000" placeholder="Find remote Node.js jobs…"><button>Send</button></form></section>
<section><h2>Import & edit CV facts</h2><form id="import-profile"><input id="profile-name" required value="Primary profile"><input id="cv-file" type="file" accept="text/plain,text/markdown" required><button>Import safely</button></form><small>Milestone parser accepts text/Markdown. Changes below become explicit user-verified edits.</small><div id="profiles"></div></section>
<section><h2>Create campaign</h2><form id="create-campaign"><input id="campaign-name" required value="Backend search"><input id="profile-id" required placeholder="Profile ID"><input id="query" required value="Node.js backend"><input id="location" required value="Egypt"><input id="schedule" value="Every weekday at 9:00 AM"><input id="timezone" value="Africa/Cairo"><label><input id="dry-run" type="checkbox" checked> Dry run</label><button>Create</button></form></section>
<section><h2>Campaigns</h2><div id="campaigns"></div></section><section><h2>Application preview & approvals</h2><div id="preview">Run a campaign first.</div><button id="fill">Approve selected fields & fill current mock form</button></section><section><h2>Audit timeline</h2><pre id="timeline"></pre></section><script type="module" src="dist/sidepanel.js"></script></body></html>
