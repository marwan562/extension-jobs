<!doctype html>
<html>

<head>
    <title>Apply</title>
</head>

<body>
    <header><a href="/me/applications">My Applications</a></header>
    <main>
        <h1>Apply to Senior Node.js Engineer</h1>
        <form aria-label="Job application"><label for="email">Email address</label><input id="email" name="email"
                type="email" required><label for="phone">Phone number</label><input id="phone" name="phone" type="tel"
                required><button type="submit">Submit Application</button></form><output role="status"
            id="application-status">Ready for review</output>
    </main>
    <script>document.querySelector('form').addEventListener('submit', event => { event.preventDefault(); document.querySelector('#application-status').value = 'Application received' })</script>
</body>

</html>
