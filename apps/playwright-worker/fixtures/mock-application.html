<!doctype html><html><head><meta charset="utf-8"><title>Development application</title></head><body><main><h1>Example Labs — Backend Engineer</h1><form aria-label="Job application"><label for="email">Email address</label><input id="email" name="email" type="email" required><label for="phone">Phone number</label><input id="phone" name="phone" type="tel" required><label for="sponsorship">Will you require visa sponsorship?</label><select id="sponsorship" name="sponsorship" required><option value="">Choose</option><option>Yes</option><option>No</option></select><label for="salary">Expected salary</label><input id="salary" name="salary"><button id="submit" type="submit">Submit application</button></form><output id="submitted">not submitted</output></main><script>document.querySelector('form').addEventListener('submit',event=>{event.preventDefault();document.querySelector('#submitted').value='submitted'})</script></body></html>
