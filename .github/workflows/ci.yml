name: CI

on:
  push:
  pull_request:

jobs:
  cross-platform:
    name: Node 24 / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Chromium system dependencies
        if: runner.os == 'Linux'
        run: npx playwright install-deps chromium
      - name: Install Chromium
        run: npx playwright install chromium
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run test:contract
      - run: npm run test:integration
      - run: npm run test:e2e
      - run: npm run build

  release-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run plugin:build
      - run: npm run plugin:validate
      - run: npm audit --audit-level=high
      - run: npm run secret:scan
      - run: npm run release:package
      - name: Verify build artifacts
        run: node -e "const fs=require('fs'); for(const f of ['apps/extension/dist/service-worker.js','apps/openclaw-jobs/dist/index.js','packages/composio-jobs/dist/index.js','apps/cli/dist/index.js','output/release/SHA256SUMS']) if(!fs.existsSync(f)) throw new Error(f)"
      - uses: actions/upload-artifact@v4
        with:
          name: extension-jobs-release-candidate
          path: output/release/*
          if-no-files-found: error
